services:
  postgres:
    image: postgres:16
    container_name: postgres
    env_file:
      - ./post-service/.env      # Переменные окружения для БД
    ports:
      - "5432:5432"              # внешний порт 5433 для хоста, внутри контейнера 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      # Сколько раз Docker попытается выполнить тест, прежде чем считать контейнер unhealthy
      retries: 5

  post-service:
    build: ./post-service
    env_file:
      - ./post-service/.env
    environment:
      - APP_ENV=dev
    ports:
      - "8000:8000"
    networks:
      - monitoring
    command: ["sh", "-c", "./migrator --migrations-path ./migrations && ./post-service"]
    depends_on:
      postgres: # Ждем пока health у postgres будет пройден
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  notification-service:
    build: ./notification-service
    environment:
      - APP_ENV=dev
    ports:
      - "8001:8001"
    networks:
      - monitoring
    command: ["./notification-service"]
    depends_on:
      - post-service
  redis:
    container_name: redis
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - ../data/redis:/data
    restart: always
    networks:
      - monitoring


  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - monitoring

